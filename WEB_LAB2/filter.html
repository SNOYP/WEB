<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фільтр | Акваріум</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { aqua: { teal: '#0A7065', dark: '#111111', coral: '#FF7D4A', coralDark: '#E76F51', bgLight: '#F3F4F6', bgDark: '#737373', cardDark: '#525252' } } } } }
        if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
        function toggleTheme() { document.documentElement.classList.toggle('dark'); localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light'); }
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); document.getElementById('overlay').classList.toggle('hidden'); }
    </script>
</head>
<body class="bg-white dark:bg-aqua-bgDark text-black dark:text-white min-h-screen flex transition-colors duration-300 font-sans">
<div id="overlay" class="fixed inset-0 bg-black/50 z-30 hidden lg:hidden" onclick="toggleMenu()"></div>
<aside id="sidebar" class="w-64 bg-aqua-teal dark:bg-aqua-dark fixed h-full text-white shadow-xl transition-transform duration-300 z-40 -translate-x-full lg:translate-x-0 flex flex-col">
    <div class="flex justify-end p-4 lg:hidden">
        <button onclick="toggleMenu()" class="text-2xl"><i class="fa-solid fa-times"></i></button>
    </div>
    <nav class="flex-col pt-4 lg:pt-8 space-y-2 px-4 flex-1 text-lg">
        <a href="index.html" class="flex items-center gap-3 p-3 font-semibold hover:bg-black/10 rounded-lg transition"><i class="fa-solid fa-house w-6 text-center"></i> Головна</a>
        <a href="ph.html" class="flex items-center gap-3 p-3 font-semibold hover:bg-black/10 rounded-lg transition"><i class="fa-solid fa-droplet w-6 text-center"></i> Рівень pH</a>
        <a href="temp.html" class="flex items-center gap-3 p-3 font-semibold hover:bg-black/10 rounded-lg transition"><i class="fa-solid fa-temperature-half w-6 text-center"></i> Температура</a>
        <a href="filter.html" class="flex items-center gap-3 p-3 font-semibold bg-black/20 rounded-lg"><i class="fa-solid fa-filter w-6 text-center"></i> Фільтр</a>
        <a href="light.html" class="flex items-center gap-3 p-3 font-semibold hover:bg-black/10 rounded-lg transition"><i class="fa-solid fa-lightbulb w-6 text-center"></i> Освітлення</a>
    </nav>
    <div class="p-8 flex justify-center pb-12">
        <button onclick="toggleTheme()" class="text-3xl hover:text-yellow-300 hover:scale-110 transition-all cursor-pointer"><i class="fa-regular fa-lightbulb"></i></button>
    </div>
</aside>
<div class="flex-1 lg:ml-64 flex flex-col min-h-screen">
    <header class="bg-aqua-coral dark:bg-black h-20 flex items-center justify-center shadow-md transition-colors duration-300 relative">
        <button onclick="toggleMenu()" class="absolute left-6 lg:hidden text-2xl text-black dark:text-white"><i class="fa-solid fa-bars"></i></button>
        <h1 class="text-xl md:text-2xl font-bold text-black dark:text-white transition-colors duration-300">Фільтри</h1>
    </header>
    <main class="p-6 md:p-16 flex-1 flex flex-col items-center justify-center mx-auto w-full max-w-3xl">
        <div class="space-y-4 md:space-y-6 text-2xl md:text-4xl font-bold mb-10 md:mb-16 self-start w-full">
            <p>Очищення: <span class="text-aqua-coral dark:text-aqua-coralDark transition-colors">95%</span></p>
            <p>Потік: <span class="text-aqua-teal dark:text-white">400 л/год</span></p>
        </div>
        <hr class="border-gray-300 dark:border-gray-600 mb-8 md:mb-12 border-2 rounded-full w-full">
        <h3 class="text-2xl md:text-3xl font-bold mb-6 md:mb-8 self-start">Сервіс лог</h3>
        <ul class="space-y-4 md:space-y-6 text-lg md:text-3xl font-semibold self-start w-full">
            <li class="flex items-center gap-4 md:gap-6 transition-colors"><div class="w-10 h-10 md:w-12 md:h-12 flex shrink-0 items-center justify-center bg-gray-100 dark:bg-black rounded-full shadow-inner transition-colors"><i class="fa-solid fa-leaf text-aqua-teal text-lg md:text-xl"></i></div> Біофільтр: 95%</li>
            <li class="flex items-center gap-4 md:gap-6 transition-colors"><div class="w-10 h-10 md:w-12 md:h-12 flex shrink-0 items-center justify-center bg-gray-100 dark:bg-black rounded-full shadow-inner transition-colors"><i class="fa-solid fa-droplet text-aqua-teal text-lg md:text-xl"></i></div> Механічний: 400 л/год</li>
            <li class="flex items-center gap-4 md:gap-6 transition-colors"><div class="w-10 h-10 md:w-12 md:h-12 flex shrink-0 items-center justify-center bg-gray-100 dark:bg-black rounded-full shadow-inner transition-colors"><i class="fa-solid fa-bubbles text-aqua-teal text-lg md:text-xl"></i></div> Тонка очистка: 200 л/год</li>
            <li class="flex items-center gap-4 md:gap-6 transition-colors"><div class="w-10 h-10 md:w-12 md:h-12 flex shrink-0 items-center justify-center bg-gray-100 dark:bg-black rounded-full shadow-inner transition-colors"><i class="fa-solid fa-gear text-aqua-teal text-lg md:text-xl"></i></div> Обслуговування: через 10 днів</li>
        </ul>
    </main>
</div>
</body>
</html>
